<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <!-- Do not forget to change the path to the css file -->
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
</head>

<body>

    <div id="box">

        <nav>
            <img src="./static/img/logo.jpg" alt="logo">

            <ul class="menu">
                <li><a href="/">Home</a></li>
                <li><a href="/create">Add Book</a></li>
                <li><a href="/search">Search</a></li>
                <li><a href="/about">About</a></li>
            </ul>

        </nav>

        <main>

            <section id="not-found">
                <div class="missing-card">
                    <div class="missing-card-stamp">MISSING</div>
                    <p class="missing-code">ERROR 404</p>
                    <h1>Card Not Found</h1>
                    <p class="missing-text">
                        This title isn't in the catalog. It may have been withdrawn,
                        misfiled, or never checked in to begin with.
                    </p>
                    <a href="/" class="back-home">Return to Catalog</a>
                </div>
            </section>

        </main>

        <footer>
            © JS Back-End Workshop
        </footer>
    </div>

</body>

</html>
