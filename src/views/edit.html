<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Page</title>

    <!-- Do not forget to change the path to the css file -->
    <link href="./static/css/style.css" type="text/css" rel="stylesheet">
</head>

<body>

    <div id="box">


        <nav>
            <!-- Do not forget to change the path to the image -->
            <img src="./static/img/logo.jpg" alt="logo">

            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Search</a></li>
                <!--Users-->
                <li><a href="#">Add Book</a></li>
                <li><a href="#">Add Review</a></li>
                <li><a href="#">Logout</a></li>
                <!--Guest-->
                <li><a href="#">Login</a></li>
                <li><a href="#">Register</a></li>
            </ul>

        </nav>


        <main>

            <section id="edit-page">
                <div class="editSection">
                    <div class="info-edit">
                        <h2>"It was a bright cold day in April, and the clocks were striking thirteen."</h2>
                    </div>

                    <form action="#" method="" class="editForm">
                        <h2>Edit Post</h2>
                        <ul class="noBullet">
                            <li>
                                <label for="title">Title:</label>
                                <input type="text" class="inputFields" id="title" name="" value="Pride and Prejudce" />
                            </li>
                            <li>
                                <label for="category">Category:</label>
                                <select id="category" class="inputFields" name="category">
                                    <option value="">Select Category</option>
                                    <option value="novel" selected>Novel</option>
                                    <option value="poetry">Poetry</option>
                                    <option value="biography">Biography</option>
                                    <option value="non-fiction">Non-Fiction</option>
                                    <option value="short-story">Short Story</option>
                                </select>
                            </li>
                            <li>
                                <label for="genre">Genre:</label>
                                <input type="text" class="inputFields" id="genre" name="" value="Romance" />
                            </li>
                            <li>
                                <label for="author">Author:</label>
                                <input type="text" class="inputFields" id="author" name="" value="Jane Austen" />
                            </li>
                            <li>
                                <label for="date">Year:</label>
                                <input type="number" class="inputFields" id="year" name="" value="1813" />
                            </li>
                            <li>
                                <label for="image">Book Cover:</label>
                                <input type="text" class="inputFields" id="image" name="" value="https://upload.wikimedia.org/wikipedia/commons/1/17/PrideAndPrejudiceTitlePage.jpg" />
                            </li>
                            <li>
                                <label for="image">Rating:</label>
                                <input type="text" class="inputFields" id="rating" name="" value="5" />
                            </li>
                            <li>
                                <label for="description">Description:</label>
                                <textarea id="description" class="inputFields" name="description">Elizabeth Bennet, the second of five daughters in a respectable but not wealthy family, must navigate the rigid expectations of English society. When the wealthy and proud Mr. Darcy arrives in her neighborhood, first impressions create misunderstanding and friction between them.</textarea>
                            </li>
                            <li id="center-btn">
                                <button id="edit-btn">Edit</button>
                            </li>
                        </ul>
                    </form>

                </div>
            </section>

        </main>


        <footer>
            © JS Back-End Workshop
        </footer>
    </div>

</body>

</html>
